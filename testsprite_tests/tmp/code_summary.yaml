version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 15 (App Router)
  - React 19
  - ShadCN (Radix UI)
  - Tailwind CSS 4
  - Supabase (Auth + PostgreSQL)
  - Google Gemini AI
  - Motion (Framer Motion)
  - Lucide React
routes:
  - path: /
    file: app/page.tsx
    auth_required: true
    description: Main SPA containing login screen and all 21 clinical/financial modules rendered via activeSubmodule state
  - path: /api/gemini
    file: app/api/gemini/route.ts
    auth_required: false
    description: Server-side proxy for Google Gemini AI API calls
features:
  - name: User Authentication
    description: Login with email and password via Supabase Auth, with account lockout after 5 failed attempts and session timeout
    files:
      - app/page.tsx
      - lib/supabaseClient.ts
    entry_route: /
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Toggle password visibility
      - Click login button
      - See error message on invalid credentials
      - See lockout message after 5 failed attempts
      - Session timeout warning modal
    api_calls:
      - method: POST
        endpoint: supabase.auth.signInWithPassword
      - method: GET
        endpoint: supabase.auth.getSession
    auth_required: false
  - name: Patient Admission
    description: Multi-tab patient admission form with document validation, duplicate detection, and merge workflow
    files:
      - components/ReceptionModule.tsx
      - app/page.tsx
    entry_route: /
    user_interactions:
      - Fill patient identification fields (name, document, birthdate, gender)
      - Fill contact and address fields
      - Fill insurance and complementary data
      - Fill guardian data for minors
      - Capture webcam photo
      - Upload patient photo
      - Validate Paraguay CI document with check digit
      - Auto-correct phone format to +595
      - Detect duplicate patients and merge records with PIN
    api_calls:
      - method: SELECT
        endpoint: supabase.patients
      - method: INSERT
        endpoint: supabase.patients
      - method: UPDATE
        endpoint: supabase.patients
    auth_required: true
  - name: Appointment Scheduling
    description: Appointment scheduling with conflict detection, overbooking authorization, and waitlist management
    files:
      - components/AgendaModule.tsx
      - components/ReceptionModule.tsx
      - app/page.tsx
    entry_route: /
    user_interactions:
      - Select date and time slot
      - Select doctor and modality
      - Select patient for appointment
      - View appointment conflict warnings
      - Authorize overbooking with PIN
      - Add to waitlist
      - Manage blocked slots
      - Send WhatsApp reminder
    api_calls:
      - method: SELECT
        endpoint: supabase.appointments
      - method: INSERT
        endpoint: supabase.appointments
      - method: UPDATE
        endpoint: supabase.appointments
    auth_required: true
  - name: Electronic Health Record
    description: Full EHR with anamnesis, physical exam, SOAP notes, CID-10 diagnoses, prescriptions, and AI clinical summary
    files:
      - components/ClinicalModule.tsx
      - app/page.tsx
      - app/api/gemini/route.ts
    entry_route: /
    user_interactions:
      - Fill anamnesis fields (personal/family pathology, habits, allergies, medications)
      - Record physical exam vital signs
      - Write SOAP notes
      - Search and select CID-10 diagnoses
      - Create prescriptions with drug interaction checking
      - Request lab and imaging exams
      - Record procedures
      - Attach files
      - Sign documents electronically
      - Generate AI clinical summary via Dr. IA
    api_calls:
      - method: POST
        endpoint: /api/gemini
      - method: SELECT
        endpoint: supabase.patients.clinical_history
    auth_required: true
  - name: Diagnostic Imaging
    description: PACS DICOM viewer with brightness/contrast/zoom controls and radiology reports
    files:
      - components/DiagnosticModule.tsx
      - app/page.tsx
    entry_route: /
    user_interactions:
      - View DICOM studies
      - Adjust brightness, contrast, zoom, rotation
      - Filter by modality (RX, TC, RM, US, MG, PET)
      - Create radiology reports
      - Manage worklist
      - View HL7 messages
      - Review lab results with critical value alerts
    api_calls:
      - method: SELECT
        endpoint: supabase.dtes
    auth_required: true
  - name: Electronic Billing
    description: DTE generation for Paraguay SIFEN with XML output and payment gateway reconciliation
    files:
      - components/AdminFinanceModule.tsx
      - app/page.tsx
    entry_route: /
    user_interactions:
      - Generate DTE documents
      - View KuDE visualization
      - Create credit/debit notes
      - Download XML
      - Cancel DTE
      - Reconcile payments with gateways (Bancard, Pagopar, Tigo Money)
    api_calls:
      - method: SELECT
        endpoint: supabase.dtes
    auth_required: true
  - name: Financial Management
    description: Revenue/expense tracking, accounts payable/receivable, cash flow, and accounting entries
    files:
      - components/AdminFinanceModule.tsx
      - app/page.tsx
    entry_route: /
    user_interactions:
      - Create financial postings (revenue/expenses)
      - Manage accounts payable/receivable
      - View cash flow projections
      - Perform bank reconciliation
      - Track cost centers
      - Generate income statements
      - Record accounting journal entries
    api_calls:
      - method: SELECT
        endpoint: supabase.financial_postings
    auth_required: true
  - name: Pharmacy and Inventory
    description: Drug items with lot control, stock movements, pharmacovigilance, and expiry alerts
    files:
      - components/EstoqueFarmaciaModule.tsx
      - app/page.tsx
    entry_route: /
    user_interactions:
      - View pharmacy items with lot control
      - Record stock movements (entry, exit, transfer, dispensing)
      - Perform inventory counts
      - View expiry alerts (color-coded)
      - Report adverse events (pharmacovigilance)
      - Report quality deviations
      - Initiate batch recalls
    api_calls:
      - method: SELECT
        endpoint: supabase.pharmacy_items
      - method: SELECT
        endpoint: supabase.stock_movements
    auth_required: true
  - name: CRM and Marketing
    description: Marketing campaigns, lead management, sales funnel, and NPS analysis
    files:
      - components/CrmBiModule.tsx
      - app/page.tsx
    entry_route: /
    user_interactions:
      - Create marketing campaigns (WhatsApp, email, SMS, phone)
      - Manage leads in sales funnel
      - Analyze NPS surveys
      - Manage LGPD opt-outs
      - Capture web form leads
    api_calls:
      - method: SELECT
        endpoint: supabase.crm_campaigns
      - method: SELECT
        endpoint: supabase.crm_leads
    auth_required: true
  - name: Hospital Management
    description: Bed management, surgery scheduling, and hospitalization episodes
    files:
      - components/InternacaoCentroCirurgicoModule.tsx
      - app/page.tsx
    entry_route: /
    user_interactions:
      - View bed status (6 colors)
      - Transfer beds between sectors
      - Schedule surgeries (8-status workflow)
      - Complete surgical checklists
      - Record intraoperative data
      - Track hospitalization episodes
      - Record medical evolution
      - Fill nursing sheets
    api_calls:
      - method: SELECT
        endpoint: supabase.beds
    auth_required: true
  - name: Patient Portal
    description: Patient-facing portal with appointment booking, prescriptions, payments, and telemedicine
    files:
      - components/PatientPortalModule.tsx
      - app/page.tsx
    entry_route: /
    user_interactions:
      - Login with CI + password + OTP
      - Book appointments online
      - View prescriptions
      - View exam results
      - Make online payments (PIX, credit/debit card)
      - Start telemedicine video call
      - View notifications
      - Update profile
    api_calls:
      - method: SELECT
        endpoint: supabase.appointments
    auth_required: true
  - name: System Administration
    description: User management, RBAC, password policies, 2FA/MFA, and SSO configuration
    files:
      - components/AdminFinanceModule.tsx
      - app/page.tsx
    entry_route: /
    user_interactions:
      - CRUD system users
      - Configure RBAC permissions
      - Set password policies
      - Configure auto-lockout settings
      - Setup 2FA/MFA with TOTP
      - Configure SSO providers (OIDC/SAML)
      - View active sessions
      - Review login attempt logs
    api_calls:
      - method: SELECT
        endpoint: supabase.audit_logs
    auth_required: true
  - name: Internationalization
    description: Runtime language switching across 6 languages with persistence in localStorage
    files:
      - lib/i18n/I18nContext.tsx
      - lib/i18n/locales/pt-BR.json
      - lib/i18n/locales/pt-PT.json
      - lib/i18n/locales/es-AR.json
      - lib/i18n/locales/es-PY.json
      - lib/i18n/locales/es.json
      - lib/i18n/locales/en.json
    entry_route: /
    user_interactions:
      - Select language from dropdown on login screen
      - Select language from header dropdown
      - See UI text update immediately
    api_calls: []
    auth_required: false
  - name: Occupational Medicine
    description: ASO exams, companies, contracts, workstations, and MTESS compliance for Paraguay
    files:
      - components/MedicinaTrabalhoModule.tsx
      - components/ClinicalModule.tsx
      - app/page.tsx
    entry_route: /
    user_interactions:
      - Register companies and contracts
      - Define workstations and occupational risks
      - Record worker data and exams
      - Generate CAL certificates
      - Create MTESS reports
      - Record ASO exams (admissional, periodic, demissional)
    api_calls:
      - method: SELECT
        endpoint: supabase.aso_exams
    auth_required: true
known_limitations:
  - issue: All data fetching is client-side via Supabase JS client with no server components fetching data
    location: app/page.tsx, all component files
    impact: Data is loaded in useEffect hooks, no SSR data fetching, potential performance issues on initial load
  - issue: Massive single page file (1470 lines) and large component files (up to 3536 lines)
    location: app/page.tsx, components/AdminFinanceModule.tsx, components/ClinicalModule.tsx
    impact: Difficult to maintain, test, and debug due to extreme file sizes
  - issue: Hardcoded merge PIN (1234) and overbooking PIN (1234)
    location: components/ReceptionModule.tsx
    impact: Security vulnerability - authorization PINs visible in source code
  - issue: Mock data fallback when Supabase is unreachable
    location: lib/mockData.ts (3520 lines)
    impact: App works without database but shows fake data, could confuse users
  - issue: No API rate limiting on /api/gemini endpoint
    location: app/api/gemini/route.ts
    impact: Potential abuse of Gemini API credits
  - issue: Optimistic updates without rollback mechanism
    location: app/page.tsx
    impact: If Supabase write fails, local state is inconsistent with database
  - issue: No React error boundaries
    location: app/layout.tsx, app/page.tsx
    impact: Runtime errors crash the entire app without graceful error display
  - issue: No pagination for patient lists, appointment lists, and logs
    location: components/ReceptionModule.tsx, components/AgendaModule.tsx
    impact: Performance degradation with large datasets
  - issue: Placeholder GEMINI_API_KEY in .env.local
    location: .env.local
    impact: AI features will not work without valid API key
  - issue: ESLint errors suppressed during builds
    location: next.config.ts
    impact: Code quality issues may go unnoticed
